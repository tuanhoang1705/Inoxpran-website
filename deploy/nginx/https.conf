map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name www.inoxpran.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  if ($request_uri ~* "^/(dqjs|zzzs|hyzx|qydt)(/|\\?|$)") {
    return 410;
  }
  if ($args ~* "^(new|news|wmsg|qywh|dangqun)/") {
    return 410;
  }
  if ($args ~* "^[^=/][^=]*$") {
    return 410;
  }
  if ($args ~* "\\.cshtml($|&)") {
    return 410;
  }

  return 301 https://inoxpran.com$request_uri;
}

