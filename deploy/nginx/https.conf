server {
  listen 443 ssl;
  http2 on;
  server_name inoxpran.com;

  ssl_certificate     /etc/letsencrypt/live/inoxpran.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/inoxpran.com/privkey.pem;

  # Block legacy query-based URLs from an old site structure.
  if ($request_uri ~* "^/(dqjs|zzzs|hyzx|qydt)(/|\\?|$)") {
    return 410;
  }
  if ($args ~* "^(new|news|wmsg|qywh|dangqun)/") {
    return 410;
  }
  # Legacy URLs that use query strings without key=value pairs (e.g. ?new/xxx or ?rlzy1/).
  # Allow SvelteKit action URLs that start with "?/".
  if ($args ~* "^[^=/][^=]*$") {
    return 410;
  }
  if ($args ~* "\\.cshtml($|&)") {
    return 410;
  }

  client_max_body_size 20m;

  location /v1/api/ {
    proxy_pass http://backend:3056/v1/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /favicon.ico {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
  }

  location = /site.webmanifest {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
  }

  location ^~ /icons/ {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
  }

  location ~* ^/(images/|vendor/) {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location / {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
