server {
  listen 443 ssl;
  http2 on;
  server_name inoxpran.com;

  ssl_certificate     /etc/letsencrypt/live/inoxpran.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/inoxpran.com/privkey.pem;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Block legacy query-based URLs from an old site structure.
  if ($request_uri ~* "^/(dqjs|zzzs|hyzx|qydt)(/|\\?|$)") {
    return 410;
  }
  if ($request_uri ~* "^/cdn-cgi/l/email-protection(?:\\?|$)") {
    return 410;
  }
  if ($args ~* "^(new|news|wmsg|qywh|dangqun)/") {
    return 410;
  }
  # Legacy URLs that use query strings without key=value pairs (e.g. ?new/xxx or ?rlzy1/).
  # Allow SvelteKit action URLs that start with "?/".
  if ($args ~* "^[^=/][^=]*$") {
    return 410;
  }
  if ($args ~* "\\.cshtml($|&)") {
    return 410;
  }

  client_max_body_size 50m;
  proxy_buffer_size 256k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 512k;

  location ~ ^/admin(?:/(.*))?$ {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    return 308 https://admin.inoxpran.com/$1$is_args$args;
  }

  location /v1/api/ {
    proxy_pass http://backend:3056/v1/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /favicon.ico {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_hide_header Content-Type;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Content-Type "image/x-icon" always;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location = /site.webmanifest {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location ^~ /icons/ {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location ~* ^/(images/|vendor/) {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
  }

  location / {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name admin.inoxpran.com;

  ssl_certificate     /etc/letsencrypt/live/inoxpran.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/inoxpran.com/privkey.pem;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  client_max_body_size 50m;
  proxy_buffer_size 256k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 512k;

  add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

  location = /robots.txt {
    default_type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
  }

  location = /sitemap.xml {
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    return 404;
  }

  location ~ ^/admin(?:/(.*))?$ {
    return 308 https://admin.inoxpran.com/$1$is_args$args;
  }

  location = /favicon.ico {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_hide_header Content-Type;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Content-Type "image/x-icon" always;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  }

  location = /site.webmanifest {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  }

  location ^~ /_app/ {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  }

  location ^~ /icons/ {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  }

  location ~* ^/(images/|vendor/) {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
  }

  location = / {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend:4173;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
