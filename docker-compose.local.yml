name: inoxpran-local

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"

  backend:
    build: ./backend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3056
      MONGODB_URI: ${MONGODB_URI}
      APP_BASE_URL: http://localhost:4173
      PUBLIC_SITE_URL: http://localhost:4173
      PUBLIC_WEB_BASE: http://localhost:4173
    restart: unless-stopped
    ports:
      - "${LOCAL_BACKEND_PORT:-3056}:3056"
    depends_on:
      - redis

  n8n:
    image: n8nio/n8n:2.12.2
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      N8N_PORT: 5678
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-this-in-env}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      NODE_FUNCTION_ALLOW_BUILTIN: ${NODE_FUNCTION_ALLOW_BUILTIN:-http,https,url}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      BACKEND_API_BASE_URL: http://backend:3056/v1/api
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      PUBLIC_WEB_BASE: http://localhost:4173
    volumes:
      - ./deploy/n8n/data:/home/node/.n8n
      - ./deploy/n8n/workflows:/workflows:ro
    restart: unless-stopped
    ports:
      - "${LOCAL_N8N_PORT:-5678}:5678"
  frontend:
    build: ./frontend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
      API_BASE_URL: http://backend:3056/v1/api
      API_KEY: ${API_KEY}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-50M}
      PUBLIC_SITE_URL: http://localhost:4173
      APP_BASE_URL: http://localhost:4173
      PUBLIC_WEB_BASE: http://localhost:4173
    restart: unless-stopped
    ports:
      - "${LOCAL_FRONTEND_PORT:-4173}:4173"
    depends_on:
      - redis
      - backend
