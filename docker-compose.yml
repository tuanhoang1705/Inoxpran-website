services:
  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    networks:
      - appnet

  backend:
    build: ./backend
    container_name: app_backend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3056
      MONGODB_URI: ${MONGODB_URI}
      APP_BASE_URL: ${APP_BASE_URL}
    restart: unless-stopped
    networks:
      - appnet

  n8n:
    image: n8nio/n8n:2.12.2
    container_name: app_n8n
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      N8N_PORT: 5678
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-this-in-env}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      NODE_FUNCTION_ALLOW_BUILTIN: ${NODE_FUNCTION_ALLOW_BUILTIN:-http,https,url}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      BACKEND_API_BASE_URL: ${BACKEND_API_BASE_URL:-http://backend:3056/v1/api}
    volumes:
      - ./deploy/n8n/data:/home/node/.n8n
      - ./deploy/n8n/workflows:/workflows:ro
    restart: unless-stopped
    networks:
      - appnet

  frontend:
    build: ./frontend
    container_name: app_frontend
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4173
      API_BASE_URL: ${API_BASE_URL:-http://backend:3056/v1/api}
      API_KEY: ${API_KEY}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-50M}
    restart: unless-stopped
    networks:
      - appnet
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: app_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/letsencrypt
      - ./deploy/nginx/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: app_certbot
    volumes:
      - ./deploy/nginx/ssl:/etc/letsencrypt
      - ./deploy/nginx/www:/var/www/certbot
    entrypoint: >-
      sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done"
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
