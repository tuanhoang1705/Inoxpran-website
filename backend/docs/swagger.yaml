openapi: 3.0.3
info:
  title: Inoxpran Backend API
  version: 1.0.0
  description: API documentation for the backend routes under /v1/api.
servers:
  - url: http://localhost:3056/v1/api
security:
  - ApiKeyAuth: []
tags:
  - name: User
  - name: Admin
  - name: Product
  - name: Cart
  - name: Shipping
  - name: Checkout
  - name: Discount
  - name: Inventory
paths:
  /user/signup:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    post:
      tags: [User]
      summary: User signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSignupRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /user/login:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    post:
      tags: [User]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /user/logout:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [User]
      summary: User logout
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /user/refresh-token:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/RefreshTokenHeader"
    post:
      tags: [User]
      summary: User refresh token
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          RefreshTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /user/profile:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    get:
      tags: [User]
      summary: Get user profile
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [User]
      summary: Update user profile
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/signup:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    post:
      tags: [Admin]
      summary: Admin signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSignupRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/login:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    post:
      tags: [Admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/logout:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [Admin]
      summary: Admin logout
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/refresh-token:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/RefreshTokenHeader"
    post:
      tags: [Admin]
      summary: Admin refresh token
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          RefreshTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/profile:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    get:
      tags: [Admin]
      summary: Get admin profile
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [Admin]
      summary: Update admin profile
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AdminProfileUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/users:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    get:
      tags: [Admin]
      summary: List users
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/users/{userId}:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    get:
      tags: [Admin]
      summary: Get user by id
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/users/{userId}/status:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    patch:
      tags: [Admin]
      summary: Update user status
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product/search/{keySearch}:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    get:
      tags: [Product]
      summary: Search products
      parameters:
        - name: keySearch
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    get:
      tags: [Product]
      summary: List products
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    post:
      tags: [Product]
      summary: Create product
      description: Admin system only.
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientIdHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product/{productId}:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
    get:
      tags: [Product]
      summary: Get product by id
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    patch:
      tags: [Product]
      summary: Update product
      description: Admin system only.
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientIdHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product/publish/{id}:
    parameters:
