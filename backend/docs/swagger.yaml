      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [Product]
      summary: Publish product
      description: Admin system only.
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product/unPublish/{id}:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [Product]
      summary: Unpublish product
      description: Admin system only.
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /product/drafts/all:
