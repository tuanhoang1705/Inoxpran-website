      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    get:
      tags: [Cart]
      summary: Get user cart
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    post:
      tags: [Cart]
      summary: Add to cart
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartAddRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      tags: [Cart]
      summary: Delete cart item
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartDeleteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /cart/update:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      requestBody:
        required: true
