      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
    post:
      tags: [Checkout]
      summary: Cancel order (creates cancel request if confirmed)
      security:
        - ApiKeyAuth: []
          ClientIdAuth: []
          AccessTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /checkout/admin/orders/{orderId}/status:
    parameters:
      - $ref: "#/components/parameters/ApiKeyHeader"
      - $ref: "#/components/parameters/ClientIdHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
