<!doctype html>
<html lang="%html.lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preload" href="/vendor/bootstrap.min.css" as="style" />
		<link
			rel="stylesheet"
			href="/vendor/bootstrap.min.css"
			media="print"
			onload="this.media='all'"
		/>
		<noscript><link rel="stylesheet" href="/vendor/bootstrap.min.css" /></noscript>
		<link rel="dns-prefetch" href="//firebasestorage.googleapis.com" />
		<link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
		<link rel="dns-prefetch" href="//fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="//fonts.gstatic.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

		%sveltekit.head%

		<link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260615" sizes="any" />
		<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=20260615" />
		<link rel="icon" type="image/png" href="/favicon-16x16.png?v=20260615" sizes="16x16" />
		<link rel="icon" type="image/png" href="/favicon-32x32.png?v=20260615" sizes="32x32" />
		<link rel="icon" type="image/png" href="/icons/favicon-48x48.png?v=20260615" sizes="48x48" />
		<link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260615" sizes="96x96" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/icons/apple-touch-icon-180x180.png?v=20260615"
		/>
		<meta name="msapplication-TileColor" content="#1d4e63" />
		<meta name="msapplication-TileImage" content="/icons/mstile-150x150.png?v=20260615" />
		<meta name="msapplication-config" content="/browserconfig.xml?v=20260615" />
		<link rel="manifest" href="/site.webmanifest?v=20260615" />

		<!-- Non-blocking Google Font -->
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media = 'all'"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media = 'all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
				rel="stylesheet"
			/>
			<link
				href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap"
				rel="stylesheet"
			/>
		</noscript>
	</head>

	<body class="project-inp" data-sveltekit-preload-data="hover" data-sveltekit-reload>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
